<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uplift — Compliment & Joke Generator</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ============================================
       BACKGROUND SCENE
       ============================================ -->
  <div class="bg-scene" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <canvas id="particle-canvas"></canvas>
  </div>

  <!-- Confetti container -->
  <div class="confetti-container" id="confetti-container" aria-hidden="true"></div>

  <!-- ============================================
       APP SHELL
       ============================================ -->
  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <a href="#" class="logo" aria-label="Uplift">
        <span class="logo-icon" aria-hidden="true"></span>
        <span class="logo-text">Uplift</span>
      </a>
      <nav class="header-actions" aria-label="App controls">
        <div class="favs-wrapper">
          <button class="glass-btn" id="favs-btn" aria-label="View saved favorites">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77
                5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            <span class="badge" id="fav-badge" aria-label="Favorites count">0</span>
          </button>
        </div>
        <button class="glass-btn" id="theme-btn" aria-label="Toggle dark mode">
          <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg id="icon-moon" class="hidden" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main">

      <!-- Headline -->
      <div class="hero-text">
        <h1>A little warmth<br><em>goes a long way.</em></h1>
      </div>

      <!-- Mode Toggle: Compliments vs Jokes -->
      <div class="mode-toggle" role="radiogroup" aria-label="Choose mode">
        <button class="mode-btn active" id="mode-compliments" role="radio" aria-checked="true">
          <span class="mode-emoji">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#E8788A" stroke="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </span> Compliments
        </button>
        <button class="mode-btn" id="mode-jokes" role="radio" aria-checked="false">
          <span class="mode-emoji">😂</span> Jokes
        </button>
      </div>

      <!-- Name input (compliments mode only) -->
      <div class="controls" id="compliment-controls">
        <div class="input-group">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" class="ctrl-input" id="name-input"
            placeholder="Your name (optional)"
            aria-label="Enter your name for personalized compliments" maxlength="30">
        </div>
      </div>

      <!-- Card -->
      <section class="card" id="card" aria-live="polite" aria-atomic="true">
        <div class="card-inner">
          <blockquote class="compliment" id="compliment-text">
            Tap the button below to brighten your day.
          </blockquote>
          <div class="card-actions">
            <button class="action-chip" id="copy-btn" aria-label="Copy to clipboard">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              <span id="copy-label">Copy</span>
            </button>
            <button class="action-chip" id="fav-btn" aria-label="Save to favorites">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77
                  5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
              <span>Favorite</span>
            </button>
            <button class="action-chip" id="share-btn" aria-label="Share">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/>
                <circle cx="18" cy="19" r="3"/>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
              </svg>
              <span>Share</span>
            </button>
          </div>
        </div>
      </section>

      <!-- Generate Button -->
      <div class="generate-area">
        <button class="generate-btn" id="generate-btn">
          <span class="btn-text" id="generate-label">Generate Compliment</span>
          <span class="btn-sparkle" aria-hidden="true">✨</span>
        </button>
      </div>

    </main>

    <footer class="footer">Made with warmth &amp; good vibes</footer>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- ============================================
       FAVORITES MODAL
       ============================================ -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true"
    aria-label="Saved favorites">
    <div class="modal">
      <div class="modal-header">
        <h2>Favorites</h2>
        <button class="glass-btn" id="modal-close" aria-label="Close favorites">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="app.js"></script>
</body>
</html>
